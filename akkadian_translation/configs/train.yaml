model:
  type: "custom" # Options: custom, mbart, mt5, t5
  pretrained_path: "facebook/mbart-large-50" # Used if type is not "custom"
  encoder_layers: 6
  decoder_layers: 6
  hidden_size: 512
  attention_heads: 8
  feedforward_dim: 2048
  dropout: 0.1
  vocab_size: 12000
  max_sequence_length: 128

training:
  batch_size_per_gpu: 4
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-5
  epochs: 10
  warmup_steps: 1000
  save_total_limit: 3
  mixed_precision: true
  clip_norm: 1.0
  label_smoothing: 0.1

augmentation:
  mask_probability: 0.1
  syllable_dropout: 0.05
  noise_injection: 0.02
  
curriculum:
  enabled: true
  phase1_epochs: 3
  phase2_epochs: 6

data:
  train_path: "data/raw/train.csv"
  val_path: "data/raw/val.csv"
  tokenizer_model_path: "tokenizer/tokenizer.model"
  
generation:
  beam_size: 5
  max_output_length: 64
  length_penalty: 1.0
  early_stopping: true

paths:
  checkpoint_dir: "/kaggle/working/checkpoints"
  log_dir: "/kaggle/working/logs"
  experiment_log_path: "/kaggle/working/logs/experiments.json"
